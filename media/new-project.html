<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="{{CSS_URI}}">
</head>
<body class="sub-panel">
  <div class="section-row">
    <span class="label">Board</span>
  </div>
  <input id="np-search" type="text" placeholder="Search boards&#8230;" oninput="filterBoards(this.value)" autocomplete="off" spellcheck="false">
  <div id="np-board-list" class="lib-list" style="margin-bottom:8px;max-height:200px"></div>
  <p class="np-hint" id="np-hint">Select a board with a <code>[new_project]</code> config to scaffold a project.</p>
  <div id="np-action" style="display:none">
    <button onclick="send('newProject')">New Project&#8230;</button>
  </div>
  <script src="{{JS_URI}}"></script>
</body>
</html>

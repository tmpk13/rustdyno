<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="{{CSS_URI}}">
</head>
<body class="sub-panel">
  <div id="np-setup" style="display:none">
    <p class="np-hint">No board config directory found in this workspace.</p>
    <button id="np-setup-btn" onclick="setupWorkspace()">Setup .rustdyno</button>
  </div>
  <div class="section-row">
    <span class="label">Board</span>
    <button class="icon-btn" onclick="refreshBoards()" title="Refresh board list">
      <img id="npRefreshIcon" class="icon-svg">
    </button>
  </div>
  <input id="np-search" type="text" placeholder="Search boards&#8230;" oninput="filterBoards(this.value)" autocomplete="off" spellcheck="false">
  <div id="np-board-list" class="lib-list"></div>
  <p class="np-hint" id="np-hint">Select a board with a <code>[new_project]</code> config to scaffold a project.</p>
  <div id="np-action">
    <span class="label">Project Name</span>
    <input id="np-name" type="text" placeholder="my-embedded-app" autocomplete="off" spellcheck="false" oninput="clearError(this)">
    <span class="label np-location-label">Location</span>
    <div class="np-location-row">
      <input id="np-location" type="text" placeholder="Select folder&#8230;" autocomplete="off" spellcheck="false" oninput="clearError(this)">
      <button class="np-browse-btn" onclick="browseLocation()" title="Browse">&#8230;</button>
    </div>
    <button id="np-create-btn" onclick="createProject()">Create Project</button>
    <button id="np-apply-btn" onclick="applyBoard()">Apply Board to Current Project</button>
  </div>
  <script src="{{JS_URI}}"></script>
</body>
</html>

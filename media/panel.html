<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="{{CSS_URI}}">
</head>

<body>

  <div id="sectionsContainer">
    <div class="panel-section" data-section="files">
      <div class="section-row">
        <span class="label">Files</span>
        <div class="file-section-btns">
          <button class="icon-btn" id="hiddenToggle" onclick="toggleHidden()" title="Toggle hidden files">
            <img id="hiddenIcon" class="icon-svg">
          </button>
          <button class="icon-btn" onclick="spinRefresh('refreshIcon'); send('refresh')" title="Refresh file list">
            <img id="refreshIcon" class="icon-svg">
          </button>
        </div>
      </div>
      <hr class="thick-divider">
      <div class="file-list" id="fileList"></div>
      <div id="hiddenSection">
        <div class="label">Hidden</div>
        <div class="file-list" id="hiddenList"></div>

      </div>
      <hr class="thick-divider">
    </div>

    <div class="panel-section" data-section="actions">
      <div id="actionBtns"></div>
    </div>
    <div class="panel-section" data-section="rtt">
      <button id="rttBtn" onclick="sendAction(this,'rtt')" class="action-button" data-tip-label="Attach to device output"
        data-tip-cmd="">
        <span class="btn-icon"><img id="rttRunIcon" class="btn-run-icon"></span>
        <span class="btn-label">RTT Monitor</span>
        <span class="btn-check"><img id="rttCheckIcon" class="btn-check-icon"></span>
        <img class="btn-spin-icon">
      </button>
      <hr class="thick-divider">
    </div>

    <div class="panel-section" data-section="config">
      <div class="config-header" onclick="toggleConfig()">
        <img class="config-arrow" id="configArrow">
        <span class="config-summary" id="configSummary"></span>
        <span id="probeDot" class="probe-dot" title="Checking..."></span>
      </div>
      <div id="configSection">
        <div class="label">Target</div>
        <div class="cs-wrap">
          <div class="cs-btn" onclick="toggleDrop(event,'menu-target')">
            <span class="cs-val" id="cs-val-target">No files</span>
            <img id="dropTarget" class="drop-icon">
          </div>
          <div class="drop-menu" id="menu-target"></div>
        </div>

        <hr class="thick-divider">
        <div class="label">Board</div>
        <div class="cs-wrap">
          <div class="cs-btn" onclick="toggleDrop(event,'menu-board')">
            <span class="cs-val" id="cs-val-board">-- choose a board --</span>
            <img id="dropBoard" class="drop-icon">
          </div>
          <div class="drop-menu" id="menu-board"></div>
        </div>
        <div class="active-board" id="activeBoardLabel"></div>

        <hr class="thick-divider">
        <div class="label" id="portLabelEl">Port</div>
        <div class="port-row">
          <div class="cs-wrap">
            <div class="cs-btn" onclick="toggleDrop(event,'menu-port')">
              <span class="cs-val" id="cs-val-port">auto</span>
              <img id="dropPort" class="drop-icon">
            </div>
            <div class="drop-menu" id="menu-port">
              <div class="drop-item drop-active" data-val="" onclick="pickPort('','auto')">-- auto --</div>
            </div>
          </div>
          <button class="icon-btn" onclick="refreshPorts()" title="Refresh port list"><img
              id="refreshPortIcon" class="icon-svg"></button>
        </div>
        <div id="probeNamingArea">
          <hr class="thick-divider">
          <div class="label">Probes</div>
          <div id="probeNamingList"></div>
        </div>
      </div>
    </div>
  </div>

  <template id="tpl-file-item">
    <div class="file-item" draggable="true">
      <span class="file-name"></span>
      <button class="remove-btn" draggable="false" title="Hide file">&#x2715;</button>
    </div>
  </template>

  <template id="tpl-hidden-item">
    <div class="file-item hidden-item">
      <span class="file-name"></span>
      <button class="remove-btn" title="Restore file">&#x2715;</button>
    </div>
  </template>

  <template id="tpl-drop-item">
    <div class="drop-item"></div>
  </template>

  <template id="tpl-action-simple">
    <button class="action-button">
      <span class="btn-icon"><img class="btn-run-icon"></span>
      <span class="btn-label"></span>
      <span class="btn-check"><img class="btn-check-icon"></span>
      <img class="btn-spin-icon">
    </button>
  </template>

  <template id="tpl-action-split">
    <div class="split-group">
      <button class="split-main action-button">
        <span class="btn-icon"><img class="btn-run-icon"></span>
        <span class="btn-label"></span>
        <span class="btn-check"><img class="btn-check-icon"></span>
        <img class="btn-spin-icon">
      </button>
      <button class="split-drop"><img class="drop-icon"></button>
      <div class="drop-menu"></div>
    </div>
  </template>

  <div id="editFooter">
    <span class="label">Edit layout</span>
    <div id="editHeader">
      <button class="icon-btn edit-reset-btn" id="resetLayoutBtn" onclick="resetLayout()" title="Reset layout to default">&#x21BA;</button>
      <button class="icon-btn edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()" title="Edit panel layout">&#x270E;</button>
    </div>
  </div>

  <script src="{{JS_URI}}"></script>
</body>

</html>

[board]
name   = "Raspberry Pi Pico 2 (RP2350)"
chip   = "RP2350A"
target = "thumbv8m.main-none-eabihf"

[probe]
protocol = "swd"
speed    = 4000          # kHz

[flash]
restore_unwritten = false
halt_afterwards   = false

[rtt]
enabled  = true
channels = [{ up = 0, name = "Terminal" }]

# ---------------------------------------------------------------------------
# [new_project] — files and settings scaffolded when creating a new project
# ---------------------------------------------------------------------------
[new_project]
runner = "probe-rs run --chip RP2350A --protocol swd"

[new_project.dependencies]
cortex-m         = { version = "0.7.7", features = ["inline-asm"] }
cortex-m-rt      = "0.7.5"
panic-halt       = "1.0"
rtt-target       = "0.6"
rp235x-hal       = { version = "0.2", features = ["rt"] }

[[new_project.files]]
path              = "rustdyno.toml"
replace_if_exists = true
content = """
default="rpi-pico2.toml"
"""

[[new_project.files]]
path    = "src/main.rs"
content = """
#![no_std]
#![no_main]

use cortex_m_rt::entry;
use panic_halt as _;
use rtt_target::{rtt_init_print, rprintln};
use rp235x_hal as hal;

#[link_section = \".start_block\"]
#[used]
pub static IMAGE_DEF: hal::block::ImageDef = hal::block::ImageDef::secure_exe();

const XTAL_FREQ_HZ: u32 = 12_000_000;

#[entry]
fn main() -> ! {
    rtt_init_print!();
    let _pac = hal::pac::Peripherals::take().unwrap();
    rprintln!(\"Hello from RP2350!\");
    loop {}
}
"""

[[new_project.files]]
path              = "Embed.toml"
replace_if_exists = true
content = """
[default.general]
chip = \"RP2350A\"

[default.reset]
halt_afterwards = false

[default.rtt]
enabled = true

[default.gdb]
enabled = false
"""

[[new_project.files]]
path              = "memory.x"
replace_if_exists = true
content = """
MEMORY {
    FLASH : ORIGIN = 0x10000000, LENGTH = 4096K
    RAM   : ORIGIN = 0x20000000, LENGTH = 520K
}
"""

[[new_project.files]]
path              = ".cargo/config.toml"
replace_if_exists = true
content = """
[target.thumbv8m.main-none-eabihf]
runner    = \"probe-rs run --chip RP2350A --protocol {{PROTOCOL}}\"
rustflags = [\"-C\", \"link-arg=-Tlink.x\", \"-C\", \"link-arg=-Tmemory.x\"]

[build]
target = \"thumbv8m.main-none-eabihf\"
"""

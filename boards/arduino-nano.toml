[board]
name   = "Arduino Nano (ATmega328P)"
chip   = "ATmega328P"
target = "avr-atmega328p"

# ATmega328P is flashed via avrdude/ravedude — not probe-rs.
# Connect via USB; the Nano's USB-serial adapter exposes a COM/ttyUSB port.

[rtt]
enabled = false          # No RTT on AVR; use serial (UART) for output

# ---------------------------------------------------------------------------
# [new_project] — files and settings scaffolded when creating a new project
# ---------------------------------------------------------------------------
[new_project]
runner = "ravedude nano -cb 57600"

[new_project.dependencies]
avr-device    = { version = "0.5", features = ["atmega328p"] }
arduino-hal   = { git = "https://github.com/Rahix/avr-hal", features = ["arduino-nano"] }
panic-halt    = "1.0"
ufmt          = "0.2"

[[new_project.files]]
path              = "rustdyno.toml"
replace_if_exists = true
content = """
default="arduino-nano.toml"
"""

[[new_project.files]]
path    = "src/main.rs"
content = """
#![no_std]
#![no_main]

use panic_halt as _;

#[arduino_hal::entry]
fn main() -> ! {
    let dp = arduino_hal::Peripherals::take().unwrap();
    let pins = arduino_hal::pins!(dp);
    let mut serial = arduino_hal::default_serial!(dp, pins, 57600);

    ufmt::uwriteln!(&mut serial, \"Hello from ATmega328P!\").unwrap();

    loop {}
}
"""

[[new_project.files]]
path              = "rust-toolchain.toml"
replace_if_exists = true
content = """
[toolchain]
channel    = \"nightly\"
components = [\"rust-src\"]
"""

[[new_project.files]]
path              = ".cargo/config.toml"
replace_if_exists = true
content = """
[build]
target = \"avr-atmega328p\"

[target.avr-atmega328p]
runner = \"ravedude nano -cb 57600\"

[unstable]
build-std = [\"core\"]
"""

[board]
name   = "Teensy 4.1 (IMXRT1062)"
chip   = "MIMXRT1062DVJ6A"
target = "thumbv7em-none-eabihf"

# Teensy 4.1 uses the same IMXRT1062 as the 4.0 but adds more pins,
# 8MB external flash, Ethernet, and optional PSRAM.
# Flashed via HalfKay bootloader (teensy_loader_cli).
# SWD debug available via pads on the underside of the board.

[probe]
protocol = "swd"
speed    = 4000          # kHz — via soldered SWD pads only

[flash]
restore_unwritten = false
halt_afterwards   = false

[rtt]
enabled  = true
channels = [{ up = 0, name = "Terminal" }]

# ---------------------------------------------------------------------------
# [new_project] — files and settings scaffolded when creating a new project
# ---------------------------------------------------------------------------
[new_project]
runner = "teensy_loader_cli --mcu=TEENSY41 -w -v"

dependencies = """
cortex-m    = { version = "0.7.7", features = ["inline-asm"] }
cortex-m-rt = "0.7.5"
panic-halt  = "1.0"
rtt-target  = "0.6"
teensy4-bsp = { version = "0.5", features = ["rt", "teensy41"] }
"""

[[new_project.files]]
path              = "rustdyno.toml"
replace_if_exists = true
content = """
default="teensy41.toml"
"""

[[new_project.files]]
path    = "src/main.rs"
content = """
#![no_std]
#![no_main]

use panic_halt as _;
use rtt_target::{rtt_init_print, rprintln};
use teensy4_bsp as bsp;

#[bsp::rt::entry]
fn main() -> ! {
    rtt_init_print!();
    let _peripherals = bsp::Peripherals::take();
    rprintln!(\"Hello from Teensy 4.1!\");
    loop {}
}
"""

[[new_project.files]]
path              = ".cargo/config.toml"
replace_if_exists = true
content = """
[target.thumbv7em-none-eabihf]
# teensy_loader_cli expects a .hex; wrap with objcopy
runner    = \"sh -c 'arm-none-eabi-objcopy -O ihex $0 $0.hex && teensy_loader_cli --mcu=TEENSY41 -w -v $0.hex'\"
rustflags = [\"-C\", \"link-arg=-Tt4link.x\"]

[build]
target = \"thumbv7em-none-eabihf\"
"""

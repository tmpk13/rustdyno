[board]
name   = "ESP32-C3"
chip   = "esp32c3"
target = "riscv32imc-unknown-none-elf"

[probe]
protocol = "jtag"
speed    = 4000        # kHz — USB-JTAG on ESP32-C3 handles up to ~4 MHz reliably

[flash]
# probe-rs handles ESP32-C3 flash automatically; add extra options here if needed
# e.g. reset_halt = true

[rtt]
enabled = true

[[rtt.channels]]
up   = 0
name = "Terminal"

# ---------------------------------------------------------------------------
# [new_project] — files and settings scaffolded when creating a new project
# ---------------------------------------------------------------------------
[new_project]
runner = "probe-rs run --chip esp32c3"

[new_project.dependencies]
"esp-backtrace" = { version = "0.14", features = ["esp32c3", "exception-handler", "panic-handler", "println"] }
"esp-hal"       = { version = "0.22", features = ["esp32c3"] }
"esp-println"   = { version = "0.12", features = ["esp32c3", "log"] }

[[new_project.files]]
path    = "src/main.rs"
content = """
#![no_std]
#![no_main]

use esp_backtrace as _;
use esp_hal::prelude::*;
use esp_println::println;

#[entry]
fn main() -> ! {
    println!(\"Hello from ESP32-C3!\");
    loop {}
}
"""

[[new_project.files]]
path    = ".cargo/config.toml"
content = """
[target.riscv32imc-unknown-none-elf]
runner = "probe-rs run --chip esp32c3"

[build]
target = "riscv32imc-unknown-none-elf"
"""
